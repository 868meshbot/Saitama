; Saitama — open-source standalone firmware for LoRa mesh devices
; Copyright 2026 Saitama — MIT License
;
; Platform:  ESP32-S3 (T-Deck / T-Deck Plus)
; Framework: Arduino
; Display:   ST7789 320x240 IPS
; LoRa:      SX1262
; Build:     pio run -e t-deck

[env:t-deck]
platform  = espressif32
board     = esp32-s3-devkitm-1
framework = arduino

; ── Flash & partition layout ──────────────────────────────────────────
board_build.flash_size    = 16MB
board_build.flash_mode    = dio
board_build.partitions    = partitions.csv
board_upload.flash_size   = 16MB
board_upload.maximum_size = 16777216

; ── CPU & PSRAM ──────────────────────────────────────────────────────
board_build.f_cpu       = 240000000L
board_build.arduino.memory_type = qio_opi
build_flags =
  -DARDUINO_ESP32S3_DEV
  -DBOARD_HAS_PSRAM=1
  -DPSRAM=opi
  -DPSRAM_MODE=octal
  -DPSRAM_SIZE=8388608
  -DCONFIG_SPIRAM_USE_MALLOC=1
  -DCONFIG_ESP32S3_SPIRAM_SUPPORT=1

; ── USB CDC (required for Serial to work on ESP32-S3) ────────────────
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1

; ── Saitama build flags ───────────────────────────────────────────
  -DOPS_VERSION="1.0.0"
  -DOPS_PLATFORM_TDECK=1
  -DOPS_SCREEN_W=320
  -DOPS_SCREEN_H=240

; ── MeshCore integration ────────────────────────────────────────────
; MeshCore lives in lib/MeshCore as a git submodule
  -DMESH_DEBUG=0
  -DMAX_CONTACTS=100
  -DMAX_GROUP_CHANNELS=10

; ── LoRa radio (SX1262 on T-Deck Plus via RadioLib + MeshCore) ───────
; Pins use both naming conventions: OPS (for Board.cpp) and MeshCore/RadioLib.
; SPI bus (SCK=40 MISO=38 MOSI=41) shared with TFT — CS pins separate.
  -DRADIOLIB_STATIC_ONLY=1
  -DRADIOLIB_LOW_LEVEL=1
  -DRADIOLIB_GODMODE=1
  -DUSE_SX1262=1
; RadioLib / MeshCore pin names
  -DP_LORA_NSS=9
  -DP_LORA_DIO_1=45
  -DP_LORA_RESET=17
  -DP_LORA_BUSY=13
  -DP_LORA_SCLK=40
  -DP_LORA_MISO=38
  -DP_LORA_MOSI=41
; Legacy OPS names (used by Board.cpp comments only)
  -DLORA_CS=9
  -DLORA_RST=17
  -DLORA_DIO1=45
  -DLORA_BUSY=13
; LoRa modem parameters — EU868 defaults, overridable at runtime
  -DLORA_FREQ=868.618
  -DLORA_BW=62.5
  -DLORA_SF=8
  -DLORA_CR=8
  -DLORA_TX_POWER=22
; SX1262 hardware options (T-Deck Plus schematic)
  -DSX126X_DIO2_AS_RF_SWITCH=false
  -DSX126X_CURRENT_LIMIT=140
  -DSX126X_RX_BOOSTED_GAIN=1
  -DSX126X_DIO3_TCXO_VOLTAGE=1.8f

; ── Display driver (ST7789 via SPI) ─────────────────────────────────
; TFT_eSPI is configured entirely via build flags (-DUSER_SETUP_LOADED=1
; suppresses the library's own User_Setup.h search).
; All pin numbers verified against the LilyGo T-Deck Plus schematic.
  -DUSER_SETUP_LOADED=1
  -DST7789_DRIVER=1
  -DUSE_FSPI_PORT
  -DTFT_INVERT_COLORS
  -DTFT_WIDTH=320
  -DTFT_HEIGHT=240
  -DOPS_TFT_WIDTH=320
  -DOPS_TFT_HEIGHT=240
  -DCGRAM_OFFSET=1
  -DTFT_CS=12
  -DTFT_DC=11
  -DTFT_RST=-1
  -DTFT_BL=42
  -DTFT_MOSI=41
  -DTFT_MISO=38
  -DTFT_SCLK=40
  -DLOAD_GLCD=1
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=6000000

; ── GPS (T-Deck Plus has built-in GPS, OG uses external) ─────────────
  -DOPS_HAS_BUILTIN_GPS=1

; ── Debug serial ────────────────────────────────────────────────────
  -DCORE_DEBUG_LEVEL=1
  -DBOARD_HAS_USB_SERIAL=1

; ── LVGL config ─────────────────────────────────────────────────────
  -DLV_CONF_INCLUDE_SIMPLE
  -I lib
  -I lib/MeshCore/lib/ed25519

; ── Optimisation: size matters on embedded ──────────────────────────
  -Os
  -ffunction-sections
  -fdata-sections
  -Wl,--gc-sections

; ── Pre-build script (remove Helium ARM assembly) ─────────────────────
extra_scripts =
  pre:pre_build.py
  post:post_build.py

; ── Monitor ─────────────────────────────────────────────────────────
monitor_speed = 115200
monitor_filters = direct

; ── Lib deps (managed via PlatformIO registry) ─────────────────────
lib_deps =
  bodmer/TFT_eSPI@^2.5.34
  lvgl/lvgl@^9.2.0
  adafruit/Adafruit BusIO@^1.16
  adafruit/RTClib@^2.1
  jgromes/RadioLib @ ^7.6.0
  densaugeo/base64 @ ^1.4.0
  mikalhart/TinyGPSPlus @ ^1.0.3
  bblanchon/ArduinoJson @ ^7.0
  ricmoo/qrcode @ ^0.0.1
  earlephilhower/ESP8266Audio @ ^1.9.7
  ; ── NavBoxLib (experimental navboxlib branch only) ──────────────────
  ; Replaces the hand-rolled MapEngine tile renderer with NavBoxLib's
  ; managed tile cache, LVGL image objects, and MarkerLayer overlays.
  https://github.com/t413/NavBoxLib.git#lvgl9
  bitbank2/PNGdec @ ^1.0.3

lib_ignore =
  lvgl/src/draw/sw/blend/helium
  lvgl/src/draw/arm2d
  lvgl/src/draw/nema_gfx
  lvgl/src/draw/nxp
  lvgl/src/draw/renesas
  lvgl/src/draw/sdl
  lvgl/src/draw/vg_lite_tvg
  lvgl/src/draw/dma2d
  lvgl/src/draw/eve
  lvgl/src/draw/nanovg
  lvgl/src/draw/opengles
  lvgl/src/draw/espressif

; ── Lib dirs ────────────────────────────────────────────────────────
lib_dir = lib
; MeshCore submodule picked up automatically from lib/MeshCore
; ed25519 lives inside the MeshCore submodule's own lib directory —
; adding it to lib_extra_dirs makes PlatformIO compile its .c sources.
lib_extra_dirs = lib/MeshCore/lib

; ── Upload ─────────────────────────────────────────────────────────
upload_speed = 921600
upload_port  =

; ── Launcher-compatible upload environment ────────────────────────────
; Use:  pio run -e t-deck-launcher --target upload
;
; Writes ONLY the firmware to ota_1 (0x650000) and updates otadata (0xd000)
; so the ESP32 bootloader boots Saitama directly after flashing.
; The bmorcelli Launcher stays untouched in ota_0 (0x10000).
;
; First-time workflow:
;   1. pio run -e t-deck-launcher --target upload   ← flashes ota_1 + otadata
;   2. Device reboots into Saitama.
;   3. To return to the launcher: Settings > Return to Launcher (or reflash launcher).
;
; The normal [env:t-deck] target still does a full flash (overwrites everything)
; and is used when setting up a fresh device without the launcher.

[env:t-deck-launcher]
extends = env:t-deck
upload_command =
  esptool.py
  --chip esp32s3
  --port $UPLOAD_PORT
  --baud $UPLOAD_SPEED
  --before default_reset
  --after hard_reset
  write_flash
  --flash_mode dio
  --flash_freq 80m
  --flash_size 16MB
  0xd000  ${PROJECTDIR}/firmware/otadata_boot_ota1.bin
  0x650000 $SOURCE